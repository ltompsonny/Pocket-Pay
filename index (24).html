<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Pocket Pay" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1D9E75" />
  <title>Pocket Pay</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f2f2f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: #f2f2f0;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      padding: 10px 14px;
      padding-top: calc(10px + env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-icon {
      width: 38px;
      height: 38px;
      flex-shrink: 0;
    }
    .logo-text { display: flex; flex-direction: column; line-height: 1.15; }
    .logo-name { font-size: 18px; font-weight: 700; color: #1D9E75; letter-spacing: .2px; }
    .logo-tag { font-size: 11px; color: #5aaaf5; font-weight: 500; }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      padding: 14px 14px 40px;
    }

    /* ── TABS ── */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .tab {
      padding: 11px 8px;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #fff;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      cursor: pointer;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-family: inherit;
      transition: background .15s, color .15s;
    }
    .tab.active { background: #1D9E75; color: #fff; border-color: #1D9E75; }
    .tab i { font-size: 15px; }

    /* ── SECTIONS ── */
    .section { display: none; }
    .section.active { display: block; }

    /* ── CARDS ── */
    .card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .field-label {
      font-size: 12px;
      font-weight: 500;
      color: #555;
      margin-bottom: 7px;
      display: block;
    }

    /* ── HOURS INPUT ── */
    .hrs-wrap { display: flex; align-items: center; margin-bottom: 5px; }
    .hrs-btn {
      width: 46px;
      height: 48px;
      border: 1px solid #e0e0e0;
      background: #f2f2f0;
      font-size: 22px;
      color: #1a1a1a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-family: inherit;
    }
    .hrs-btn:first-child { border-radius: 10px 0 0 10px; }
    .hrs-btn:last-child { border-radius: 0 10px 10px 0; }
    .hrs-btn:active { background: #e1f5ee; }
    #hrs {
      flex: 1;
      height: 48px;
      border: 1px solid #e0e0e0;
      border-left: none;
      border-right: none;
      border-radius: 0;
      text-align: center;
      font-size: 26px;
      font-weight: 700;
      color: #1a1a1a;
      background: #fff;
      font-family: inherit;
    }
    #hrs:focus { outline: none; }
    .hrs-hint { font-size: 11px; color: #aaa; text-align: center; }

    /* ── BREAKDOWN ── */
    .bk {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .bk-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid #f5f5f5;
      font-size: 13px;
    }
    .bk-row:last-child { border-bottom: none; }
    .bk-left { display: flex; flex-direction: column; gap: 1px; }
    .bk-lbl { color: #555; font-size: 13px; }
    .bk-sub { font-size: 11px; color: #aaa; }
    .bk-val { font-weight: 600; color: #1a1a1a; font-size: 13px; white-space: nowrap; }
    .bk-neg { color: #c0392b; }
    .bk-total { background: #e1f5ee; }
    .bk-total .bk-lbl { font-weight: 700; color: #1a1a1a; font-size: 14px; }
    .bk-total .bk-val { font-size: 15px; color: #1D9E75; }

    /* ── PRAC TABS ── */
    .prac-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .prac-tab {
      padding: 10px 8px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fff;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      cursor: pointer;
      text-align: center;
      font-family: inherit;
      transition: background .15s, color .15s, border-color .15s;
    }
    .prac-tab.active { background: #e1f5ee; color: #1D9E75; border-color: #1D9E75; }

    /* ── MONTH ROW ── */
    .month-row { display: flex; gap: 8px; align-items: center; }
    .month-row select {
      flex: 1;
      padding: 9px 10px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      font-family: inherit;
    }
    .month-row select:focus { outline: none; border-color: #1D9E75; }
    .fetch-btn {
      padding: 9px 14px;
      background: #1D9E75;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .fetch-btn:active { opacity: .85; }
    .fetch-btn i { font-size: 14px; }

    /* ── STATUS ── */
    .status { font-size: 12px; color: #aaa; text-align: center; padding: 6px 0; min-height: 28px; }
    .status.err { color: #c0392b; }
    .status.ok { color: #1D9E75; }

    /* ── MANUAL ENTRY ── */
    .manual-card {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 10px;
    }
    .manual-card span { font-size: 13px; color: #555; white-space: nowrap; }
    .manual-input-wrap { position: relative; flex: 1; }
    .manual-input-wrap .pfx {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: #aaa; font-size: 13px; pointer-events: none;
    }
    .manual-input-wrap input {
      width: 100%;
      padding: 8px 8px 8px 22px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      font-family: inherit;
    }
    .manual-input-wrap input:focus { outline: none; border-color: #1D9E75; }

    /* ── BUTTONS ── */
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: #1D9E75;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 8px;
      font-family: inherit;
    }
    .btn-primary:active { opacity: .85; }
    .btn-secondary {
      width: 100%;
      padding: 13px;
      background: #fff;
      color: #1a1a1a;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 8px;
      font-family: inherit;
    }
    .btn-secondary:active { background: #f2f2f0; }
    .btn-primary i, .btn-secondary i { font-size: 16px; }
    .btn-copied { background: #e1f5ee !important; color: #1D9E75 !important; border-color: #1D9E75 !important; }

    /* ── INVOICE PREVIEW ── */
    .invoice-preview {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      font-size: 12px;
      line-height: 1.6;
    }
    .inv-hdr {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }
    .inv-badge {
      background: #e1f5ee;
      color: #0F6E56;
      font-size: 10px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 5px;
    }
    .inv-badge.no-gst { background: #f0ebf8; color: #4A2070; }
    .inv-from-name { font-size: 14px; font-weight: 700; color: #1a1a1a; margin-bottom: 2px; }
    .inv-from-detail { color: #555; font-size: 11px; line-height: 1.6; }
    .inv-title-block { text-align: right; }
    .inv-title { font-size: 15px; font-weight: 700; color: #1D9E75; }
    .inv-num { font-size: 11px; color: #aaa; margin-top: 2px; }
    .inv-to-label {
      font-size: 11px; font-weight: 500; color: #aaa;
      text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px;
    }
    .inv-to-detail {
      color: #555; font-size: 11px; line-height: 1.6;
      margin-bottom: 12px; padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }
    .inv-to-name { font-size: 13px; font-weight: 600; color: #1a1a1a; }
    .inv-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 10px; table-layout: fixed; }
    .inv-table th {
      text-align: left; color: #aaa; font-weight: 500;
      font-size: 11px; padding: 4px 0; border-bottom: 1px solid #eee;
    }
    .inv-table th:last-child, .inv-table td:last-child { text-align: right; }
    .inv-table td { padding: 7px 0; color: #1a1a1a; border-bottom: 1px solid #f5f5f5; vertical-align: top; }
    .inv-table tr:last-child td { border-bottom: none; }
    .inv-total {
      display: flex; justify-content: space-between;
      font-size: 14px; font-weight: 700;
      padding-top: 8px; border-top: 1px solid #eee; color: #1a1a1a;
    }
    .inv-total span:last-child { color: #1D9E75; }

    /* ── INSTALL BANNER ── */
    .install-banner {
      display: none;
      background: #1D9E75;
      color: #fff;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <img src="icon-192.png" alt="Pocket Pay" class="logo-icon" />
    <div class="logo-text">
      <span class="logo-name">Pocket Pay</span>
      <span class="logo-tag">Pay day made easy</span>
    </div>
  </div>

  <div class="install-banner" id="install-banner">
    ＋ Add Pocket Pay to your home screen
  </div>

  <div class="content">

    <div class="tabs">
      <button class="tab active" id="tab-btn-rehab" onclick="showTab('rehab')">
        <i class="ti ti-file-invoice"></i> Rehab invoice
      </button>
      <button class="tab" id="tab-btn-pay" onclick="showTab('pay')">
        <i class="ti ti-users"></i> Contractor pay
      </button>
    </div>

    <!-- ── REHAB INVOICE ── -->
    <div id="tab-rehab" class="section active">
      <div class="card">
        <span class="field-label">Hours worked</span>
        <div class="hrs-wrap">
          <button class="hrs-btn" onclick="hrsStep(-0.5)" aria-label="Decrease by 0.5">−</button>
          <input type="number" id="hrs" value="1" min="0" step="0.5" oninput="rehabCalc()">
          <button class="hrs-btn" onclick="hrsStep(0.5)" aria-label="Increase by 0.5">+</button>
        </div>
        <div class="hrs-hint">Tap − / + for 30-min steps, or type directly</div>
      </div>
      <div class="bk" id="rehab-bk"></div>
      <button class="btn-primary" id="rehab-copy-btn" onclick="copyRehab()">
        <i class="ti ti-copy"></i><span id="rehab-copy-lbl">Copy invoice lines</span>
      </button>
    </div>

    <!-- ── CONTRACTOR PAY ── -->
    <div id="tab-pay" class="section">
      <div class="card">
        <span class="field-label">Contractor</span>
        <div class="prac-tabs">
          <button class="prac-tab active" id="pt-nicholas" onclick="setPrac('nicholas')">Nicholas Kluzek</button>
          <button class="prac-tab" id="pt-valerie" onclick="setPrac('valerie')">I Mun Lai</button>
        </div>
        <span class="field-label">Month</span>
        <div class="month-row">
          <select id="pay-month"></select>
          <select id="pay-year" style="max-width:90px;"></select>
          <button class="fetch-btn" onclick="fetchPayData()">
            <i class="ti ti-refresh"></i> Fetch
          </button>
        </div>
        <div class="status" id="pay-status">Select a month and tap Fetch</div>
      </div>

      <div id="pay-results" style="display:none;">
        <div class="bk" id="pay-bk"></div>
        <div id="recon-section"></div>
        <div id="invoice-preview"></div>
        <button class="btn-primary" id="inv-copy-btn" onclick="copyInvoice()">
          <i class="ti ti-copy"></i><span id="inv-copy-lbl">Copy tax invoice</span>
        </button>
        <button class="btn-secondary" id="slip-copy-btn" onclick="copyPayslip()">
          <i class="ti ti-file-text"></i><span id="slip-copy-lbl">Copy payslip</span>
        </button>
      </div>
    </div>

  </div>
</div>

<script>
  const BACKEND = 'https://pocket-practice-backend.onrender.com';

  const PRACS = {
    nicholas: {
      id: 'PR-2302831',
      name: 'Nicholas Kluzek',
      abn: '97 400 106 262',
      address: '16 Charles Sturt Avenue\nGrange SA 5022',
      phone: '0430 164 043',
      gst: false
    },
    valerie: {
      id: 'PR-2300631',
      name: 'I Mun Lai',
      abn: '71 544 776 935',
      address: '2A Silverlake Crescent\nHighbury SA 5089',
      phone: '0404 141 138',
      gst: true
    }
  };

  const PRACTICE = {
    name: 'Lesley Tompson\ntrading as Back On Track Physiotherapy',
    address: '124 Marian Road\nGlynde SA 5070',
    abn: '75 296 604 510'
  };

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  let activePrac = 'nicholas';
  let payData = null;

  function fmt(n) {
    return '$' + parseFloat(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }
  function r2(n) { return Math.round(n * 100) / 100; }

  // ── TABS ──
  function showTab(t) {
    ['rehab', 'pay'].forEach(id => {
      document.getElementById('tab-btn-' + id).classList.toggle('active', id === t);
      document.getElementById('tab-' + id).classList.toggle('active', id === t);
    });
  }

  function setPrac(p) {
    activePrac = p;
    ['nicholas', 'valerie'].forEach(id =>
      document.getElementById('pt-' + id).classList.toggle('active', id === p)
    );
    payData = null;
    document.getElementById('pay-results').style.display = 'none';
    document.getElementById('pay-status').textContent = 'Select a month and tap Fetch';
    document.getElementById('pay-status').className = 'status';
    const me = document.getElementById('manual-entry');
    if (me) me.remove();
  }

  // ── MONTH/YEAR SELECTS ──
  (function initSelects() {
    const ms = document.getElementById('pay-month');
    const ys = document.getElementById('pay-year');
    const now = new Date();
    const prevMonth = now.getMonth() === 0 ? 11 : now.getMonth() - 1;
    MONTHS.forEach((m, i) => {
      const o = document.createElement('option');
      o.value = i + 1; o.textContent = m;
      if (i === prevMonth) o.selected = true;
      ms.appendChild(o);
    });
    const prevYear = now.getMonth() === 0 ? now.getFullYear() - 1 : now.getFullYear();
    for (let y = now.getFullYear(); y >= now.getFullYear() - 2; y--) {
      const o = document.createElement('option');
      o.value = y; o.textContent = y;
      if (y === prevYear) o.selected = true;
      ys.appendChild(o);
    }
  })();

  // ── REHAB CALCULATOR ──
  function hrsStep(n) {
    const el = document.getElementById('hrs');
    el.value = Math.max(0, Math.round((parseFloat(el.value) || 0) * 10 + n * 10) / 10);
    rehabCalc();
  }

  function rehabCalc() {
    const h = parseFloat(document.getElementById('hrs').value) || 0;
    const gross = r2(120 * h);
    const sup = r2(gross * 0.12);
    const sub = r2(gross - sup);
    const gst = r2(sub * 0.10);
    const total = r2(sub + gst);
    window._rehab = { h, gross, sup, sub, gst, total };

    document.getElementById('rehab-bk').innerHTML = `
      <div class="bk-row">
        <div class="bk-left"><div class="bk-lbl">Professional services</div><div class="bk-sub">${h}h × $120/hr</div></div>
        <span class="bk-val">${fmt(gross)}</span>
      </div>
      <div class="bk-row">
        <div class="bk-left"><div class="bk-lbl bk-neg">Less superannuation</div><div class="bk-sub">12% of ${fmt(gross)}</div></div>
        <span class="bk-val bk-neg">−${fmt(sup)}</span>
      </div>
      <div class="bk-row">
        <div class="bk-left"><div class="bk-lbl">Subtotal</div></div>
        <span class="bk-val">${fmt(sub)}</span>
      </div>
      <div class="bk-row">
        <div class="bk-left"><div class="bk-lbl">GST</div><div class="bk-sub">10% of ${fmt(sub)}</div></div>
        <span class="bk-val">${fmt(gst)}</span>
      </div>
      <div class="bk-row bk-total">
        <div class="bk-lbl">Amount due</div>
        <span class="bk-val">${fmt(total)}</span>
      </div>
    `;
  }

  function copyRehab() {
    const i = window._rehab;
    const text = `Professional Services (${i.h}h × $120/hr): ${fmt(i.gross)}\nLess Superannuation (12%): -${fmt(i.sup)}\nSubtotal: ${fmt(i.sub)}\nGST (10%): ${fmt(i.gst)}\nAmount Due: ${fmt(i.total)}`;
    navigator.clipboard.writeText(text).then(() => flash('rehab-copy-btn', 'rehab-copy-lbl', 'Copy invoice lines'));
  }

  // ── CONTRACTOR PAY ──
  // ── CONTRACTOR PAY ──
  async function fetchPayData() {
    const month = document.getElementById('pay-month').value;
    const year = document.getElementById('pay-year').value;
    const prac = PRACS[activePrac];
    const st = document.getElementById('pay-status');
    st.className = 'status';
    st.textContent = 'Running diagnostic fetch...';
    document.getElementById('pay-results').style.display = 'none';
    const me = document.getElementById('manual-entry');
    if (me) me.remove();
    const old = document.getElementById('diag-out');
    if (old) old.remove();

    try {
      // Fetch first invoice for this practitioner to see raw structure
      const invRes = await fetch(`${BACKEND}/halaxy/Invoice?practitioner-role=${prac.id}&_count=5`);
      const invData = await invRes.json();
      const invoices = (invData.entry || []).map(e => e.resource || e).filter(r => r && r.id);

      if (invoices.length === 0) {
        st.textContent = 'No invoices at all for this practitioner.';
        return;
      }

      // Take first invoice and fetch its lines
      const inv = invoices[0];
      const lineRes = await fetch(`${BACKEND}/halaxy/InvoiceLine?invoice=${inv.id}&_count=10&_include=InvoiceLine:subject`);
      const lineData = await lineRes.json();
      const firstLine = (lineData.entry || []).find(e => {
        const r = e.resource || e;
        return r && r.resourceType !== 'Patient';
      });
      const r = firstLine ? (firstLine.resource || firstLine) : null;

      // Dump everything we need to understand the structure
      const diagDiv = document.createElement('div');
      diagDiv.id = 'diag-out';
      diagDiv.style.cssText = 'background:#fff;border:1px solid #eee;border-radius:12px;padding:14px;margin:10px 0;font-size:11px;font-family:monospace;white-space:pre-wrap;word-break:break-all;overflow-x:auto;';

      const info = {
        invoice_id: inv.id,
        invoice_title: inv.title,
        invoice_date: inv.date,
        invoice_created: inv.meta && inv.meta.lastUpdated,
        invoice_status: inv.status,
        invoice_totalNet: inv.totalNet,
        invoice_totalGross: inv.totalGross,
        total_invoices_returned: invoices.length,
        total_line_entries: (lineData.entry || []).length,
        first_line_resource: r ? {
          id: r.id,
          resourceType: r.resourceType,
          status: r.status,
          enteredDate: r.enteredDate,
          date: r.date,
          meta_lastUpdated: r.meta && r.meta.lastUpdated,
          definitionCanonical: r.definitionCanonical,
          unitPriceComponent: r.unitPriceComponent,
          priceComponent: r.priceComponent,
          quantity: r.quantity,
          subject: r.subject,
          performer: r.performer,
          chargeItemCodeableConcept: r.chargeItemCodeableConcept,
          ALL_KEYS: Object.keys(r)
        } : 'no line found'
      };

      diagDiv.textContent = JSON.stringify(info, null, 2);
      document.querySelector('.content').appendChild(diagDiv);
      st.className = 'status ok';
      st.textContent = `Diagnostic complete — ${invoices.length} invoices found. See raw data below.`;

    } catch(e) {
      st.className = 'status err';
      st.textContent = 'Error: ' + e.message;
    }
  }

  function buildManualEntry(month, year) {
    const existing = document.getElementById('manual-entry');
    if (existing) existing.remove();
    const d = document.createElement('div');
    d.id = 'manual-entry';
    d.className = 'manual-card';
    d.innerHTML = `
      <span>Revenue ex-GST</span>
      <div class="manual-input-wrap">
        <span class="pfx">$</span>
        <input type="number" id="manual-amt" placeholder="0.00" step="0.01" min="0"
          oninput="if(parseFloat(this.value) > 0) buildPayResults(parseFloat(this.value), ${month}, ${year})">
      </div>
    `;
    document.getElementById('pay-status').after(d);
  }

  function buildPayResults(revenueExGST, month, year, invoiceLines) {
    invoiceLines = invoiceLines || [];
    const existing = document.getElementById('manual-entry');
    if (existing) existing.remove();
    const prac = PRACS[activePrac];
    const rev = r2(revenueExGST);
    const share = r2(rev * 0.5);
    const gst = prac.gst ? r2(share * 0.10) : 0;
    const total = r2(share + gst);
    payData = { rev, share, gst, total, month, year, prac, lines: invoiceLines };

    const invNum = `INV-${year}${String(month).padStart(2, '0')}-${prac.id.replace('PR-', '')}`;
    const invDate = new Date(year, month - 1, new Date(year, month, 0).getDate()).toLocaleDateString('en-AU');

    document.getElementById('pay-bk').innerHTML = `
      <div class="bk-row">
        <div class="bk-left"><div class="bk-lbl">Total revenue (ex-GST)</div><div class="bk-sub">${MONTHS[month - 1]} ${year}</div></div>
        <span class="bk-val">${fmt(rev)}</span>
      </div>
      <div class="bk-row">
        <div class="bk-left"><div class="bk-lbl">Contractor share</div><div class="bk-sub">50% of ${fmt(rev)}</div></div>
        <span class="bk-val">${fmt(share)}</span>
      </div>
      ${prac.gst ? `
      <div class="bk-row">
        <div class="bk-left"><div class="bk-lbl">GST (10%)</div><div class="bk-sub">I Mun Lai is GST registered</div></div>
        <span class="bk-val">${fmt(gst)}</span>
      </div>` : ''}
      <div class="bk-row bk-total">
        <div class="bk-lbl">Amount payable</div>
        <span class="bk-val">${fmt(total)}</span>
      </div>
    `;

    const fromLines = prac.address.replace(/\n/g, '<br>');
    const toLines = PRACTICE.address.replace(/\n/g, '<br>');
    const practiceName = PRACTICE.name.replace(/\n/g, '<br>');

    // Reconciliation table
    let reconHtml = '';
    if (invoiceLines.length > 0) {
      const rows = invoiceLines.map(l => {
        const name = l.patient.length > 30 ? l.patient.substring(0, 28) + '…' : l.patient;
        const descText = l.desc ? `<div style="font-size:10px;color:#aaa;margin-top:1px;">${l.desc}</div>` : '';
        return `<tr><td style="color:#555;white-space:nowrap;padding:5px 14px;vertical-align:top;">${l.date}</td><td style="color:#1a1a1a;padding:5px 4px;font-size:12px;vertical-align:top;">${name}${descText}</td><td style="text-align:right;color:#1a1a1a;font-weight:500;white-space:nowrap;padding:5px 14px;vertical-align:top;">${fmt(l.amount)}</td></tr>`;
      }).join('');
      reconHtml = `
        <div style="background:#fff;border:1px solid #eee;border-radius:12px;overflow:hidden;margin-bottom:10px;">
          <div style="padding:10px 14px;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:12px;font-weight:600;color:#1a1a1a;">Reconciliation</span>
            <span style="font-size:11px;color:#aaa;">${invoiceLines.length} invoices</span>
          </div>
          <div style="overflow-x:auto;">
            <table style="width:100%;border-collapse:collapse;font-size:12px;">
              <thead><tr style="border-bottom:1px solid #eee;">
                <th style="text-align:left;color:#aaa;font-weight:500;padding:6px 14px;white-space:nowrap;">Date</th>
                <th style="text-align:left;color:#aaa;font-weight:500;padding:6px 4px;">Patient</th>
                <th style="text-align:right;color:#aaa;font-weight:500;padding:6px 14px;">Amount</th>
              </tr></thead>
              <tbody>${rows}</tbody>
              <tfoot><tr style="border-top:1px solid #eee;background:#f9f9f9;">
                <td colspan="2" style="padding:8px 14px;font-weight:600;font-size:12px;color:#1a1a1a;">Total</td>
                <td style="padding:8px 14px;text-align:right;font-weight:700;color:#1D9E75;">${fmt(rev)}</td>
              </tr></tfoot>
            </table>
          </div>
        </div>`;
    }
    document.getElementById('recon-section').innerHTML = reconHtml;

    document.getElementById('invoice-preview').innerHTML = `
      <div class="invoice-preview">
        <div class="inv-hdr">
          <div>
            <span class="inv-badge ${prac.gst ? '' : 'no-gst'}">${prac.gst ? 'GST Registered' : 'No GST'}</span>
            <div class="inv-from-name">${prac.name}</div>
            <div class="inv-from-detail">${fromLines}<br>ABN: ${prac.abn}<br>${prac.phone}</div>
          </div>
          <div class="inv-title-block">
            <div class="inv-title">Tax Invoice</div>
            <div class="inv-num">${invNum}</div>
            <div class="inv-num">${invDate}</div>
          </div>
        </div>
        <div class="inv-to-label">Bill to</div>
        <div class="inv-to-detail">
          <div class="inv-to-name">${practiceName}</div>
          ${toLines}<br>ABN: ${PRACTICE.abn}
        </div>
        <table class="inv-table">
          <thead><tr><th>Description</th><th>Amount</th></tr></thead>
          <tbody>
            <tr>
              <td>Professional services — ${MONTHS[month - 1]} ${year}<br>
                <span style="color:#aaa;font-size:11px;">50% of practice revenue ex-GST</span>
              </td>
              <td>${fmt(share)}</td>
            </tr>
            ${prac.gst ? `<tr><td>GST (10%)</td><td>${fmt(gst)}</td></tr>` : ''}
          </tbody>
        </table>
        <div class="inv-total"><span>Total due</span><span>${fmt(total)}</span></div>
      </div>
    `;

    document.getElementById('pay-results').style.display = 'block';
  }

  function copyInvoice() {
    if (!payData) return;
    const { rev, share, gst, total, month, year, prac } = payData;
    const invNum = `INV-${year}${String(month).padStart(2, '0')}-${prac.id.replace('PR-', '')}`;
    const invDate = new Date(year, month - 1, new Date(year, month, 0).getDate()).toLocaleDateString('en-AU');
    let text = `TAX INVOICE — ${invNum}\nDate: ${invDate}\n\nFROM:\n${prac.name}\n${prac.address}\nABN: ${prac.abn}\n${prac.phone}\n\nBILL TO:\n${PRACTICE.name}\n${PRACTICE.address}\nABN: ${PRACTICE.abn}\n\nProfessional services — ${MONTHS[month - 1]} ${year} (50% of revenue ex-GST): ${fmt(share)}`;
    if (prac.gst) text += `\nGST (10%): ${fmt(gst)}`;
    text += `\n\nTOTAL DUE: ${fmt(total)}`;
    navigator.clipboard.writeText(text).then(() => flash('inv-copy-btn', 'inv-copy-lbl', 'Copy tax invoice'));
  }

  function copyPayslip() {
    if (!payData) return;
    const { rev, share, gst, total, month, year, prac, lines } = payData;
    let text = `PAYSLIP — ${MONTHS[month - 1]} ${year}\nContractor: ${prac.name}\nABN: ${prac.abn}\n`;
    if (lines && lines.length > 0) {
      text += `\nInvoice breakdown:\n`;
      lines.forEach(l => { text += `  ${l.date}  ${l.patient}  ${fmt(l.amount)}\n`; });
    }
    text += `\nTotal revenue (ex-GST): ${fmt(rev)}\nContractor share (50%): ${fmt(share)}`;
    if (prac.gst) text += `\nGST (10%): ${fmt(gst)}`;
    text += `\nAmount payable: ${fmt(total)}`;
    navigator.clipboard.writeText(text).then(() => flash('slip-copy-btn', 'slip-copy-lbl', 'Copy payslip'));
  }

  function flash(btnId, lblId, original) {
    const btn = document.getElementById(btnId);
    const lbl = document.getElementById(lblId);
    if (lbl) lbl.textContent = 'Copied!';
    if (btn) btn.classList.add('btn-copied');
    setTimeout(() => {
      if (lbl) lbl.textContent = original;
      if (btn) btn.classList.remove('btn-copied');
    }, 2000);
  }

  // ── PWA INSTALL ──
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-banner').style.display = 'block';
  });
  document.getElementById('install-banner').addEventListener('click', () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        document.getElementById('install-banner').style.display = 'none';
      });
    }
  });

  // ── SERVICE WORKER ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      reg.addEventListener('updatefound', () => {
        const w = reg.installing;
        w.addEventListener('statechange', () => {
          if (w.state === 'installed' && navigator.serviceWorker.controller) {
            if (confirm('New version of Pocket Pay available. Reload?')) {
              w.postMessage('skipWaiting');
              window.location.reload();
            }
          }
        });
      });
    });
  }

  // ── INIT ──
  rehabCalc();
</script>
</body>
</html>
