<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Pocket Pay" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1D9E75" />
  <title>Pocket Pay</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f2f2f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: #f2f2f0;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      padding: 10px 14px;
      padding-top: calc(10px + env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-icon {
      width: 38px;
      height: 38px;
      flex-shrink: 0;
    }
    .logo-text { display: flex; flex-direction: column; line-height: 1.15; }
    .logo-name { font-size: 18px; font-weight: 700; color: #1D9E75; letter-spacing: .2px; }
    .logo-tag { font-size: 11px; color: #5aaaf5; font-weight: 500; }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      padding: 14px 14px 40px;
    }

    /* ── TABS ── */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .tab {
      padding: 11px 8px;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #fff;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      cursor: pointer;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-family: inherit;
      transition: background .15s, color .15s;
    }
    .tab.active { background: #1D9E75; color: #fff; border-color: #1D9E75; }
    .tab i { font-size: 15px; }

    /* ── SECTIONS ── */
    .section { display: none; }
    .section.active { display: block; }

    /* ── CARDS ── */
    .card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .field-label {
      font-size: 12px;
      font-weight: 500;
      color: #555;
      margin-bottom: 7px;
      display: block;
    }

    /* ── HOURS INPUT ── */
    #hrs {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      font-size: 26px;
      font-weight: 700;
      color: #1a1a1a;
      background: #fff;
      font-family: inherit;
      text-align: center;
      margin-bottom: 5px;
    }
    #hrs:focus { outline: none; border-color: #1D9E75; }

    /* ── BREAKDOWN ── */
    .bk {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .bk-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid #f5f5f5;
      font-size: 13px;
    }
    .bk-row:last-child { border-bottom: none; }
    .bk-left { display: flex; flex-direction: column; gap: 1px; }
    .bk-lbl { color: #555; font-size: 13px; }
    .bk-sub { font-size: 11px; color: #aaa; }
    .bk-val { font-weight: 600; color: #1a1a1a; font-size: 13px; white-space: nowrap; }
    .bk-neg { color: #c0392b; }
    .bk-total { background: #e1f5ee; }
    .bk-total .bk-lbl { font-weight: 700; color: #1a1a1a; font-size: 14px; }
    .bk-total .bk-val { font-size: 15px; color: #1D9E75; }

    /* ── PRAC TABS ── */
    .prac-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .prac-tab {
      padding: 10px 8px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fff;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      cursor: pointer;
      text-align: center;
      font-family: inherit;
      transition: background .15s, color .15s, border-color .15s;
    }
    .prac-tab.active { background: #e1f5ee; color: #1D9E75; border-color: #1D9E75; }

    /* ── MONTH ROW ── */
    .month-row { display: flex; gap: 8px; align-items: center; }
    .month-row select {
      flex: 1;
      padding: 9px 10px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      font-family: inherit;
    }
    .month-row select:focus { outline: none; border-color: #1D9E75; }
    .fetch-btn {
      padding: 9px 14px;
      background: #1D9E75;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .fetch-btn:active { opacity: .85; }
    .fetch-btn i { font-size: 14px; }

    /* ── STATUS ── */
    .status { font-size: 12px; color: #aaa; text-align: center; padding: 6px 0; min-height: 28px; }
    .status.err { color: #c0392b; }
    .status.ok { color: #1D9E75; }

    /* ── MANUAL ENTRY ── */
    .manual-card {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 10px;
    }
    .manual-card span { font-size: 13px; color: #555; white-space: nowrap; }
    .manual-input-wrap { position: relative; flex: 1; }
    .manual-input-wrap .pfx {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: #aaa; font-size: 13px; pointer-events: none;
    }
    .manual-input-wrap input {
      width: 100%;
      padding: 8px 8px 8px 22px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      font-family: inherit;
    }
    .manual-input-wrap input:focus { outline: none; border-color: #1D9E75; }

    /* ── BUTTONS ── */
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: #1D9E75;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 8px;
      font-family: inherit;
    }
    .btn-primary:active { opacity: .85; }
    .btn-secondary {
      width: 100%;
      padding: 13px;
      background: #fff;
      color: #1a1a1a;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 8px;
      font-family: inherit;
    }
    .btn-secondary:active { background: #f2f2f0; }
    .btn-primary i, .btn-secondary i { font-size: 16px; }
    .btn-copied { background: #e1f5ee !important; color: #1D9E75 !important; border-color: #1D9E75 !important; }

    /* ── INVOICE PREVIEW ── */
    .invoice-preview {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      font-size: 12px;
      line-height: 1.6;
    }
    .inv-hdr {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }
    .inv-badge {
      background: #e1f5ee;
      color: #0F6E56;
      font-size: 10px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 5px;
    }
    .inv-badge.no-gst { background: #f0ebf8; color: #4A2070; }
    .inv-from-name { font-size: 14px; font-weight: 700; color: #1a1a1a; margin-bottom: 2px; }
    .inv-from-detail { color: #555; font-size: 11px; line-height: 1.6; }
    .inv-title-block { text-align: right; }
    .inv-title { font-size: 15px; font-weight: 700; color: #1D9E75; }
    .inv-num { font-size: 11px; color: #aaa; margin-top: 2px; }
    .inv-to-label {
      font-size: 11px; font-weight: 500; color: #aaa;
      text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px;
    }
    .inv-to-detail {
      color: #555; font-size: 11px; line-height: 1.6;
      margin-bottom: 12px; padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }
    .inv-to-name { font-size: 13px; font-weight: 600; color: #1a1a1a; }
    .inv-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 10px; table-layout: fixed; }
    .inv-table th {
      text-align: left; color: #aaa; font-weight: 500;
      font-size: 11px; padding: 4px 0; border-bottom: 1px solid #eee;
    }
    .inv-table th:last-child, .inv-table td:last-child { text-align: right; }
    .inv-table td { padding: 7px 0; color: #1a1a1a; border-bottom: 1px solid #f5f5f5; vertical-align: top; }
    .inv-table tr:last-child td { border-bottom: none; }
    .inv-total {
      display: flex; justify-content: space-between;
      font-size: 14px; font-weight: 700;
      padding-top: 8px; border-top: 1px solid #eee; color: #1a1a1a;
    }
    .inv-total span:last-child { color: #1D9E75; }

    /* ── INSTALL BANNER ── */
    .install-banner {
      display: none;
      background: #1D9E75;
      color: #fff;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <img src="icon-192.png" alt="Pocket Pay" class="logo-icon" />
    <div class="logo-text">
      <span class="logo-name">Pocket Pay</span>
      <span class="logo-tag">Pay day made easy</span>
    </div>
  </div>

  <div class="install-banner" id="install-banner">
    ＋ Add Pocket Pay to your home screen
  </div>

  <div class="content">

    <div class="tabs">
      <button class="tab active" id="tab-btn-rehab" onclick="showTab('rehab')">
        <i class="ti ti-file-invoice"></i> Rehab invoice
      </button>
      <button class="tab" id="tab-btn-pay" onclick="showTab('pay')">
        <i class="ti ti-users"></i> Contractor pay
      </button>
    </div>

    <!-- ── REHAB INVOICE ── -->
    <div id="tab-rehab" class="section active">
      <div class="card">
        <span class="field-label">Hours worked</span>
        <input type="number" id="hrs" value="1" min="0" step="0.5" oninput="rehabCalc()" placeholder="0">
      </div>
      <div class="bk" id="rehab-bk"></div>
      <button class="btn-primary" id="rehab-copy-btn" onclick="copyRehab()">
        <i class="ti ti-copy"></i><span id="rehab-copy-lbl">Copy invoice lines</span>
      </button>
    </div>

    <!-- ── CONTRACTOR PAY ── -->
    <div id="tab-pay" class="section">
      <div class="card">
        <span class="field-label">Contractor</span>
        <div class="prac-tabs">
          <button class="prac-tab active" id="pt-nicholas" onclick="setPrac('nicholas')">Nicholas Kluzek</button>
          <button class="prac-tab" id="pt-valerie" onclick="setPrac('valerie')">I Mun Lai</button>
        </div>
        <span class="field-label">Month</span>
        <div class="month-row">
          <select id="pay-month"></select>
          <select id="pay-year" style="max-width:90px;"></select>
          <button class="fetch-btn" onclick="fetchPayData()">
            <i class="ti ti-refresh"></i> Fetch
          </button>
        </div>
        <div class="status" id="pay-status">Select a month and tap Fetch</div>
      </div>

      <div id="pay-results" style="display:none;">
        <div class="bk" id="pay-bk"></div>
        <div id="recon-section"></div>
        <div id="invoice-preview"></div>
        <button class="btn-primary" onclick="printInvoice()">
          <i class="ti ti-printer"></i> Print / Save tax invoice
        </button>
        <button class="btn-secondary" onclick="printPayslip()">
          <i class="ti ti-printer"></i> Print / Save payslip
        </button>

      </div>
    </div>

  </div>
</div>

<script>
  const BACKEND = 'https://pocket-practice-backend.onrender.com';

  const PRACS = {
    nicholas: {
      id: 'PR-2302831',         // PractitionerRole ID (for Invoice queries)
      practitionerId: 'PR-1349871', // Practitioner ID (for InvoiceLine queries)
      name: 'Nicholas Kluzek',
      abn: '97 400 106 262',
      address: '16 Charles Sturt Avenue\nGrange SA 5022',
      phone: '0430 164 043',
      gst: false
    },
    valerie: {
      id: 'PR-2300631',         // PractitionerRole ID (for Invoice queries)
      practitionerId: 'PR-1348751', // Practitioner ID (for InvoiceLine queries)
      name: 'I Mun Lai',
      abn: '71 544 776 935',
      address: '2A Silverlake Crescent\nHighbury SA 5089',
      phone: '0404 141 138',
      gst: true
    }
  };

  const PRACTICE = {
    name: 'Lesley Tompson\ntrading as Back On Track Physiotherapy',
    address: '124 Marian Road\nGlynde SA 5070',
    abn: '75 296 604 510'
  };

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  let activePrac = 'nicholas';
  let payData = null;

  function fmt(n) {
    return '$' + parseFloat(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }
  function r2(n) { return Math.round(n * 100) / 100; }

  // ── TABS ──
  function showTab(t) {
    ['rehab', 'pay'].forEach(id => {
      document.getElementById('tab-btn-' + id).classList.toggle('active', id === t);
      document.getElementById('tab-' + id).classList.toggle('active', id === t);
    });
  }

  function setPrac(p) {
    activePrac = p;
    ['nicholas', 'valerie'].forEach(id =>
      document.getElementById('pt-' + id).classList.toggle('active', id === p)
    );
    payData = null;
    document.getElementById('pay-results').style.display = 'none';
    document.getElementById('pay-status').textContent = 'Select a month and tap Fetch';
    document.getElementById('pay-status').className = 'status';
    const me = document.getElementById('manual-entry');
    if (me) me.remove();
  }

  // ── MONTH/YEAR SELECTS ──
  (function initSelects() {
    const ms = document.getElementById('pay-month');
    const ys = document.getElementById('pay-year');
    const now = new Date();
    const prevMonth = now.getMonth() === 0 ? 11 : now.getMonth() - 1;
    MONTHS.forEach((m, i) => {
      const o = document.createElement('option');
      o.value = i + 1; o.textContent = m;
      if (i === prevMonth) o.selected = true;
      ms.appendChild(o);
    });
    const prevYear = now.getMonth() === 0 ? now.getFullYear() - 1 : now.getFullYear();
    for (let y = now.getFullYear(); y >= now.getFullYear() - 2; y--) {
      const o = document.createElement('option');
      o.value = y; o.textContent = y;
      if (y === prevYear) o.selected = true;
      ys.appendChild(o);
    }
  })();

  // ── REHAB CALCULATOR ──


  function rehabCalc() {
    const h = parseFloat(document.getElementById('hrs').value) || 0;
    const gross = r2(120 * h);                    // Professional services (hours × $120)
    const adjusted = r2(gross / 1.12);            // Adjusted professional services (÷ 1.12)
    const sup = r2(gross - adjusted);             // Superannuation = gross - adjusted
    const gst = r2(adjusted * 0.10);             // GST = 10% of adjusted
    const total = r2(adjusted + gst);            // Amount due = adjusted + GST
    window._rehab = { h, gross, adjusted, sup, gst, total };

    document.getElementById('rehab-bk').innerHTML = `
      <div class="bk-row">
        <div class="bk-left"><div class="bk-lbl">Professional services</div><div class="bk-sub">${h}h × $120/hr</div></div>
        <span class="bk-val">${fmt(gross)}</span>
      </div>
      <div class="bk-row">
        <div class="bk-left"><div class="bk-lbl bk-neg">Less superannuation</div><div class="bk-sub">${fmt(gross)} ÷ 1.12 = ${fmt(adjusted)}</div></div>
        <span class="bk-val bk-neg">−${fmt(sup)}</span>
      </div>
      <div class="bk-row">
        <div class="bk-left"><div class="bk-lbl">Adjusted professional services</div></div>
        <span class="bk-val">${fmt(adjusted)}</span>
      </div>
      <div class="bk-row">
        <div class="bk-left"><div class="bk-lbl">GST</div><div class="bk-sub">10% of ${fmt(adjusted)}</div></div>
        <span class="bk-val">${fmt(gst)}</span>
      </div>
      <div class="bk-row bk-total">
        <div class="bk-lbl">Amount due</div>
        <span class="bk-val">${fmt(total)}</span>
      </div>
    `;
  }

  function copyRehab() {
    const i = window._rehab;
    const text = `Professional Services (${i.h}h × $120/hr): ${fmt(i.gross)}\nLess Superannuation: -${fmt(i.sup)}\nAdjusted Professional Services: ${fmt(i.adjusted)}\nGST (10%): ${fmt(i.gst)}\nAmount Due: ${fmt(i.total)}`;
    navigator.clipboard.writeText(text).then(() => flash('rehab-copy-btn', 'rehab-copy-lbl', 'Copy invoice lines'));
  }

  // ── CONTRACTOR PAY ──
  // ── CONTRACTOR PAY ──
  async function fetchPayData() {
    const month = document.getElementById('pay-month').value;
    const year = document.getElementById('pay-year').value;
    const targetMonth = parseInt(month);
    const targetYear = parseInt(year);
    const prac = PRACS[activePrac];
    const st = document.getElementById('pay-status');
    st.className = 'status';
    st.textContent = 'Fetching from Halaxy...';
    document.getElementById('pay-results').style.display = 'none';
    const me = document.getElementById('manual-entry');
    if (me) me.remove();

    const pad = n => String(n).padStart(2,'0');
    const lastDay = new Date(targetYear, targetMonth, 0).getDate();
    const startDate = `${targetYear}-${pad(targetMonth)}-01`;
    const endDate   = `${targetYear}-${pad(targetMonth)}-${pad(lastDay)}`;

    try {
      // Step 1: load fee categories to exclude equipment
      st.textContent = 'Loading fee categories...';
      const feeRes = await fetch(`${BACKEND}/halaxy/ChargeItemDefinition?_count=200`);
      const feeData = feeRes.ok ? await feeRes.json() : { entry: [] };
      const feeCategoryMap = {};
      (feeData.entry || []).forEach(e => {
        const f = e.resource || e;
        if (!f.id) return;
        (f.useContext || []).forEach(c => {
          if (c.code && c.code.code === 'category' && c.valueCodeableConcept) {
            feeCategoryMap[f.id] = (c.valueCodeableConcept.text || '').toLowerCase();
          }
        });
      });

      // Step 2: fetch Appointments for this practitioner in the date range
      // Appointment date filter WORKS on Halaxy (unlike Invoice date filter)
      // Using PractitionerRole ID for appointment queries
      st.textContent = 'Fetching appointments...';
      let allAppointments = [];
      let page = 1;
      let hasMore = true;

      while (hasMore) {
        const res = await fetch(`${BACKEND}/halaxy/Appointment?practitioner=${prac.practitionerId}&date=ge${startDate}&date=le${endDate}&_count=200&page=${page}`);
        if (!res.ok) throw new Error(`Appointment fetch failed: ${res.status}`);
        const data = await res.json();
        const entries = (data.entry || []).map(e => e.resource || e).filter(r => r && r.id);
        allAppointments = allAppointments.concat(entries);
        const links = data.link || [];
        hasMore = links.some(l => l.relation === 'next') && entries.length > 0;
        if (hasMore) {
          page++;
          st.textContent = `Fetching appointments (page ${page})...`;
          await new Promise(r => setTimeout(r, 200));
        }
      }

      if (allAppointments.length === 0) {
        st.className = 'status err';
        st.textContent = `No appointments found for ${MONTHS[targetMonth-1]} ${targetYear}. Enter total manually:`;
        buildManualEntry(month, year);
        return;
      }

      st.textContent = `Found ${allAppointments.length} appointments, loading invoices...`;
      // Debug: log first appointment structure
      if (allAppointments.length > 0) {
      }

      // Step 3: collect invoice IDs from attended appointments
      // Each appointment participant has an invoice reference
      const invoiceIds = new Set();
      const apptDateMap = {}; // invoiceId -> { date, patientId }
      const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

      allAppointments.forEach(appt => {
        // Get appointment date from start field (local time with offset)
        const start = appt.start || '';
        if (!start) return;
        // Extract local date from start — format: "2026-04-08T14:00:00+09:30"
        const localDate = start.substring(0, 10); // YYYY-MM-DD in local time
        const [ay, am, ad] = localDate.split('-').map(Number);
        const dateStr = `${ad} ${MN[am-1]}`;

        (appt.participant || []).forEach(p => {
          if (!p.actor) return;

          // Identify patient participants by reference containing 'Patient'
          const actorRef = p.actor.reference || '';
          const isPatient = actorRef.includes('/Patient/') || p.actor.type === 'Patient';
          if (!isPatient) return;

          // Skip cancelled/DNA
          const status = p.modifierExtension && p.modifierExtension[0] &&
            p.modifierExtension[0].valueCoding && p.modifierExtension[0].valueCoding.code;
          if (status === 'cancelled' || status === 'did-not-attend' || status === 'dna') return;

          const patientId = actorRef.split('/').pop();

          // Get invoice reference from extension
          const invExt = (p.extension || []).find(ex =>
            ex.url && ex.url.includes('appointment-participant-invoice'));
          if (!invExt || !invExt.valueReference) return;
          const invoiceId = (invExt.valueReference.reference || '').split('/').pop();
          if (!invoiceId) return;

          invoiceIds.add(invoiceId);
          // Store by both invoiceId and appointmentId for lookup
          const apptId = appt.id;
          apptDateMap[invoiceId] = { date: dateStr, rawDate: localDate, patientId };
          apptDateMap[apptId]    = { date: dateStr, rawDate: localDate, patientId };
        });
      });

      if (invoiceIds.size === 0) {
        st.className = 'status err';
        st.textContent = `No invoiced appointments found. Enter total manually:`;
        buildManualEntry(month, year);
        return;
      }

      st.textContent = `Found ${invoiceIds.size} invoices, loading amounts...`;

      // Step 4: fetch invoice line items for each invoice to get amounts
      // (excludes equipment, gets correct ex-GST amounts)
      const allLines = [];
      const seenKeys = new Set();
      const invoiceIdArr = Array.from(invoiceIds);
      for (let i = 0; i < invoiceIdArr.length; i++) {
        const invoiceId = invoiceIdArr[i];
        const apptInfo = apptDateMap[invoiceId];
        st.textContent = `Loading invoice ${i+1} of ${invoiceIdArr.length}...`;
        await new Promise(r => setTimeout(r, 150));

        try {
          // Paginate line items — bulk invoices can have 40+ lines
          let lineEntries = [];
          let linePage = 1;
          let lineHasMore = true;
          while (lineHasMore) {
            const lineRes = await fetch(`${BACKEND}/halaxy/InvoiceLine?invoice=${invoiceId}&_count=50&page=${linePage}&_include=InvoiceLine:subject`);
            if (!lineRes.ok) throw new Error(`${lineRes.status}`);
            const lineData = await lineRes.json();
            const pageEntries = lineData.entry || [];
            lineEntries = lineEntries.concat(pageEntries);
            const lineLinks = lineData.link || [];
            lineHasMore = lineLinks.some(l => l.relation === 'next') && pageEntries.length > 0;
            if (lineHasMore) { linePage++; await new Promise(r => setTimeout(r, 150)); }
          }

          // Build patient map from included Patient resources
          const patientMap = {};
          lineEntries.forEach(e => {
            const r = e.resource || e;
            if (r && r.resourceType === 'Patient') {
              const n = r.name && r.name[0];
              const name = n ? (n.text || ((n.given||[]).join(' ') + ' ' + (n.family||'')).trim()) : null;
              if (name && r.id) patientMap[r.id] = name;
            }
          });

          let linesAdded = 0;
          lineEntries.forEach(e => {
            const r = e.resource || e;
            if (!r || r.resourceType === 'Patient') return;
            if (r.status === 'voided') return;

            // Skip lines not performed by this practitioner (bulk org invoices cover multiple practitioners)
            const linePerformer = r.performer ? (r.performer.reference || '').split('/').pop() : '';
            if (linePerformer && linePerformer !== prac.practitionerId) return;

            // Skip equipment
            const defCanonicals = r.definitionCanonical || [];
            const feeId = defCanonicals.length > 0 ? defCanonicals[0].split('/').pop() : '';
            if ((feeCategoryMap[feeId] || '') === 'equipment') return;

            // Use context appointment date for display — most reliable
            // context.reference is e.g. "...Appointment/2156351831"
            const contextApptId = r.context ? (r.context.reference || '').split('/').pop() : '';
            const contextApptInfo = apptDateMap[contextApptId];

            // Get context appointment date — most reliable for display
            const ctxId = r.context ? (r.context.reference || '').split('/').pop() : '';
            const ctxInfo = apptDateMap[ctxId];

            // For month filtering: use context appointment date if available,
            // otherwise fall back to enteredDate
            // This correctly handles IAP bulk invoices where enteredDate = invoice creation date
            let filterRaw;
            if (ctxInfo) {
              filterRaw = ctxInfo.rawDate;
            } else {
              filterRaw = (r.enteredDate || '').substring(0, 10);
            }
            if (!filterRaw) return;
            const [fdy, fdm, fdd] = filterRaw.split('-').map(Number);

            // Strict month filter using the most reliable date
            if (fdy !== targetYear || fdm !== targetMonth) return;

            // Display date: prefer context appointment date (correct appt date),
            // fall back to enteredDate
            const MN3 = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            let lineRawDate, lineDateStr;
            if (ctxInfo) {
              lineRawDate = ctxInfo.rawDate;
              lineDateStr = ctxInfo.date;
            } else {
              const eRaw = (r.enteredDate || '').substring(0, 10);
              const [ey, em, ed] = eRaw.split('-').map(Number);
              lineRawDate = eRaw;
              lineDateStr = `${ed} ${MN3[em-1]}`;
            }
            const [ldy, ldm, ldd] = lineRawDate.split('-').map(Number);
            const enteredRaw = filterRaw; // for backward compat

            // Amount
            let amt = 0;
            (r.unitPriceComponent || r.priceComponent || []).forEach(c => {
              if (c.type === 'base') {
                amt += parseFloat(c.amount ? (c.amount.value !== undefined ? c.amount.value : c.amount) : 0) * (parseFloat(r.quantity) || 1);
              }
            });
            amt = r2(amt);
            if (amt <= 0) return;

            // Patient name — from line item subject
            let patientName = 'Unknown';
            if (r.subject) {
              const pid = (r.subject.reference || '').split('/').pop();
              patientName = patientMap[pid] || r.subject.display || 'Unknown';
            }
            if (patientName === 'Unknown' && apptInfo && apptInfo.patientId) {
              patientName = patientMap[apptInfo.patientId] || 'Unknown';
            }

            // Date display from line item enteredDate (local date before T)
            const MN2 = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

            // Deduplicate
            const dedupKey = `${patientName}|${lineRawDate}|${feeId}`;
            if (seenKeys.has(dedupKey)) return;
            seenKeys.add(dedupKey);
            allLines.push({ date: lineDateStr, rawDate: lineRawDate, patient: patientName, amount: amt, enteredRaw });
            linesAdded++;
          });

          // Fallback: use invoice totalNet if no lines parsed
          if (linesAdded === 0) {
            const invRes2 = await fetch(`${BACKEND}/halaxy/Invoice/${invoiceId}`);
            if (invRes2.ok) {
              const invData2 = await invRes2.json();
              const amt = invData2.totalNet ? r2(parseFloat(invData2.totalNet.value || invData2.totalNet)) : 0;
              if (amt > 0 && apptInfo) {
                const dedupKey = `${apptInfo.patientId}|${apptInfo.rawDate}|invoice`;
                if (!seenKeys.has(dedupKey)) {
                  seenKeys.add(dedupKey);
                  const patientName = patientMap[apptInfo.patientId] || invData2.title || 'Unknown';
                  allLines.push({ date: apptInfo.date, rawDate: apptInfo.rawDate, patient: patientName, amount: amt });
                }
              }
            }
          }
        } catch(err) {
          console.log('Error fetching invoice', invoiceId, err.message);
        }
      }

      if (allLines.length === 0) {
        st.className = 'status err';
        st.textContent = `No billable lines found. Enter total manually:`;
        buildManualEntry(month, year);
        return;
      }

      allLines.sort((a, b) => a.rawDate.localeCompare(b.rawDate));
      const total = r2(allLines.reduce((s, l) => s + l.amount, 0));
      st.className = 'status ok';
      st.textContent = `${allLines.length} line${allLines.length !== 1 ? 's' : ''} found — total ${fmt(total)}`;
      buildPayResults(total, month, year, allLines);

    } catch(e) {
      st.className = 'status err';
      st.textContent = `Error: ${e.message} — Enter total manually:`;
      buildManualEntry(month, year);
    }
  }

  function buildManualEntry(month, year) {
    const existing = document.getElementById('manual-entry');
    if (existing) existing.remove();
    const d = document.createElement('div');
    d.id = 'manual-entry';
    d.className = 'manual-card';
    d.innerHTML = `
      <span>Revenue ex-GST</span>
      <div class="manual-input-wrap">
        <span class="pfx">$</span>
        <input type="number" id="manual-amt" placeholder="0.00" step="0.01" min="0"
          oninput="if(parseFloat(this.value) > 0) buildPayResults(parseFloat(this.value), ${month}, ${year})">
      </div>
    `;
    document.getElementById('pay-status').after(d);
  }

  function buildPayResults(revenueExGST, month, year, invoiceLines) {
    invoiceLines = invoiceLines || [];
    const existing = document.getElementById('manual-entry');
    if (existing) existing.remove();
    const prac = PRACS[activePrac];
    const rev = r2(revenueExGST);
    const share = r2(rev * 0.5);
    const gst = prac.gst ? r2(share * 0.10) : 0;
    const total = r2(share + gst);
    payData = { rev, share, gst, total, month, year, prac, lines: invoiceLines };

    const invNum = `INV-${year}${String(month).padStart(2, '0')}-${prac.id.replace('PR-', '')}`;
    const invDate = new Date(year, month - 1, new Date(year, month, 0).getDate()).toLocaleDateString('en-AU');
    const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    // Summary breakdown
    document.getElementById('pay-bk').innerHTML = `
      <div class="bk-row">
        <div class="bk-left"><div class="bk-lbl">Total revenue (ex-GST)</div><div class="bk-sub">${MONTHS[month - 1]} ${year}</div></div>
        <span class="bk-val">${fmt(rev)}</span>

        <div class="bk-left"><div class="bk-lbl">Contractor share</div><div class="bk-sub">50% of ${fmt(rev)}</div></div>

      ${prac.gst ? `
      <div class="bk-row">
        <div class="bk-left"><div class="bk-lbl">GST (10%)</div><div class="bk-sub">${prac.name} is GST registered</div></div>
        <span class="bk-val">${fmt(gst)}</span>
      </div>` : ''}
      <div class="bk-row bk-total">
        <div class="bk-lbl">Amount payable</div>
        <span class="bk-val">${fmt(total)}</span>
      </div>
    `;

    // Daily tally
    const dayTotals = {};
    invoiceLines.forEach(l => {
      if (!dayTotals[l.rawDate]) dayTotals[l.rawDate] = { date: l.date, total: 0, count: 0 };
      dayTotals[l.rawDate].total = r2(dayTotals[l.rawDate].total + l.amount);
      dayTotals[l.rawDate].count++;
    });
    const dayRows = Object.keys(dayTotals).sort().map(d => {
      const day = dayTotals[d];

      const name = l.patient.length > 30 ? l.patient.substring(0, 28) + '…' : l.patient;
      return `<tr>

      </tr>`;
    }).join('');

    document.getElementById('recon-section').innerHTML = invoiceLines.length > 0 ? `
      <div style="background:#fff;border:1px solid #eee;border-radius:12px;overflow:hidden;margin-bottom:10px;">

        </div>
        <table style="width:100%;border-collapse:collapse;font-size:12px;">
          <thead><tr style="border-bottom:1px solid #eee;">

        <div style="padding:10px 14px;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;align-items:center;">

      </div>` : '';

    // Tax invoice (printable)
    const fromLines = prac.address.replace(/\n/g, '<br>');

            <div class="inv-from-name">${prac.name}</div>

          ${toLines}<br>ABN: ${PRACTICE.abn}
        </div>
        <table class="inv-table">
          <thead><tr><th>Description</th><th>Amount</th></tr></thead>
          <tbody>
            <tr>
              <td>Professional services — ${MONTHS[month - 1]} ${year}<br>

    document.getElementById('pay-results').style.display = 'block';
  }

        This payslip was generated by Pocket Pay &nbsp;|&nbsp; Back On Track Physiotherapy &nbsp;|&nbsp; ABN: 75 296 604 510
      </div>
    </div>
    </body></html>`);
    win.document.close();
    win.focus();
    setTimeout(() => win.print(), 300);
  }

  function printInvoice() {
    if (!payData) return;
    const {rev, share, gst, total, month, year, prac} = payData;
    const MN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const invNum = `INV-${year}${String(month).padStart(2,'0')}-${prac.id.replace('PR-','')}`;
    const invDate = new Date(year, month-1, new Date(year,month,0).getDate()).toLocaleDateString('en-AU');
    const gstRow = prac.gst ? `<tr><td style="padding:8px 0;font-size:13px;border-bottom:1px solid #f5f5f5;">GST (10%)</td><td style="padding:8px 0;font-size:13px;text-align:right;">${fmt(gst)}</td></tr>` : '';
    const gstNote = prac.gst ? 'GST registered · ABN: '+prac.abn : 'Not registered for GST · ABN: '+prac.abn;

    const win = window.open('', '_blank');
    win.document.write(`<!DOCTYPE html><html><head><title>Tax Invoice ${invNum}</title>
    <style>
      *{box-sizing:border-box;margin:0;padding:0;}
      body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a;background:white;}
      .header{background:#09192f;padding:24px 36px;}
      .header-inner{display:flex;justify-content:space-between;align-items:flex-end;}
      .from-name{color:white;font-size:18px;font-weight:700;margin-bottom:4px;}
      .from-detail{color:rgba(255,255,255,0.55);font-size:12px;line-height:1.6;}
      .inv-title{color:#1D9E75;font-size:22px;font-weight:700;text-align:right;letter-spacing:1px;}
      .inv-num{color:rgba(255,255,255,0.55);font-size:11px;text-align:right;margin-top:4px;}
      .body{padding:32px 36px;}
      .to-section{padding-bottom:20px;border-bottom:3px solid #1D9E75;margin-bottom:24px;}
      .to-label{font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
      .to-name{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:3px;}
      .to-detail{font-size:12px;color:#555;line-height:1.7;}
      table{width:100%;border-collapse:collapse;margin-bottom:20px;}
      th{text-align:left;color:#aaa;font-weight:500;font-size:11px;padding:8px 0;border-bottom:1px solid #eee;}
      th:last-child,td:last-child{text-align:right;}
      td{padding:10px 0;font-size:13px;border-bottom:1px solid #f5f5f5;color:#1a1a1a;}
      .amount-box{background:#09192f;border-radius:8px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;}
      .amount-label{color:rgba(255,255,255,0.6);font-size:13px;}
      .amount-value{color:#1D9E75;font-size:22px;font-weight:700;}
      .footer{padding:16px 36px;background:#f9f9f9;border-top:1px solid #eee;display:flex;justify-content:space-between;align-items:center;}
      .footer-left{font-size:11px;color:#aaa;}
      .footer-right{font-size:11px;color:#aaa;text-align:right;}
      @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
    </style></head><body>
    <div class="header">
      <div class="header-inner">
        <div>
          <div class="from-name">${prac.name}</div>
          <div class="from-detail">${prac.address.replace(/\n/g,', ')}<br>ABN: ${prac.abn} · ${prac.phone}</div>
        </div>
        <div>
          <div class="inv-title">TAX INVOICE</div>
          <div class="inv-num">${invNum} · ${invDate}</div>
        </div>
      </div>
    </div>
    <div class="body">
      <div class="to-section">
        <div class="to-label">Bill to</div>
        <div class="to-name">Back On Track Physiotherapy</div>
        <div class="to-detail">Lesley Tompson · 124 Marian Road, Glynde SA 5070<br>ABN: 75 296 604 510</div>
      </div>
      <table>
        <thead><tr><th>Description</th><th>Amount</th></tr></thead>
        <tbody>
          <tr><td>Professional services — ${MN[month-1]} ${year}<br><span style="color:#aaa;font-size:11px;">50% of practice revenue ex-GST</span></td><td>${fmt(share)}</td></tr>
          ${gstRow}
        </tbody>
      </table>
      <div class="amount-box">
        <span class="amount-label">Total due</span>
        <span class="amount-value">${fmt(total)}</span>
      </div>
    </div>
    <div class="footer">
      <div class="footer-left">${gstNote}</div>
      <div class="footer-right">Back On Track Physiotherapy · ABN: 75 296 604 510<br>124 Marian Road, Glynde SA 5070</div>
    </div>
    </body></html>`);
    win.document.close();
    win.focus();
    setTimeout(() => win.print(), 300);
  }

  function copyInvoice() {
    if (!payData) return;
    const { rev, share, gst, total, month, year, prac } = payData;
    const invNum = `INV-${year}${String(month).padStart(2, '0')}-${prac.id.replace('PR-', '')}`;
    const invDate = new Date(year, month - 1, new Date(year, month, 0).getDate()).toLocaleDateString('en-AU');
    let text = `TAX INVOICE — ${invNum}\nDate: ${invDate}\n\nFROM:\n${prac.name}\n${prac.address}\nABN: ${prac.abn}\n${prac.phone}\n\nBILL TO:\n${PRACTICE.name}\n${PRACTICE.address}\nABN: ${PRACTICE.abn}\n\nProfessional services — ${MONTHS[month - 1]} ${year} (50% of revenue ex-GST): ${fmt(share)}`;
    if (prac.gst) text += `\nGST (10%): ${fmt(gst)}`;
    text += `\n\nTOTAL DUE: ${fmt(total)}`;
    navigator.clipboard.writeText(text).then(() => flash('inv-copy-btn', 'inv-copy-lbl', 'Copy tax invoice'));
  }

  function copyPayslip() {
    if (!payData) return;
    const { rev, share, gst, total, month, year, prac, lines } = payData;
    let text = `PAYSLIP — ${MONTHS[month - 1]} ${year}\nContractor: ${prac.name}\nABN: ${prac.abn}\n`;
    if (lines && lines.length > 0) {
      text += `\nInvoice breakdown:\n`;
      lines.forEach(l => { text += `  ${l.date}  ${l.patient}  ${fmt(l.amount)}\n`; });
    }
    text += `\nTotal revenue (ex-GST): ${fmt(rev)}\nContractor share (50%): ${fmt(share)}`;
    if (prac.gst) text += `\nGST (10%): ${fmt(gst)}`;
    text += `\nAmount payable: ${fmt(total)}`;
    navigator.clipboard.writeText(text).then(() => flash('slip-copy-btn', 'slip-copy-lbl', 'Copy payslip'));
  }

  function flash(btnId, lblId, original) {
    const btn = document.getElementById(btnId);
    const lbl = document.getElementById(lblId);
    if (lbl) lbl.textContent = 'Copied!';
    if (btn) btn.classList.add('btn-copied');
    setTimeout(() => {
      if (lbl) lbl.textContent = original;
      if (btn) btn.classList.remove('btn-copied');
    }, 2000);
  }

  // ── PWA INSTALL ──
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-banner').style.display = 'block';
  });
  document.getElementById('install-banner').addEventListener('click', () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        document.getElementById('install-banner').style.display = 'none';
      });
    }
  });

  // ── SERVICE WORKER ──
  // Fully automatic updates: as soon as a new sw.js is detected, it
  // installs and activates itself (see skipWaiting()/clients.claim()
  // in sw.js), then this page reloads once to pick up the new code.
  // No confirm dialogs, no manual steps — this can never get stuck
  // waiting on a click that never happens.
  if ('serviceWorker' in navigator) {
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });

    // updateViaCache: 'none' makes sure the browser never serves a
    // cached copy of sw.js itself when checking for updates — it
    // always asks the network whether sw.js has changed.
    navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then(reg => {
      reg.update();
    });
  }

  // ── INIT ──
  rehabCalc();
</script>
